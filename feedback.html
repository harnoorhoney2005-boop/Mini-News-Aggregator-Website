<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <style>
        :root {
            --primary: #441049;
            --card: #f4edff;
            --bg: #ceabce;
            --shadow: rgba(68, 16, 73, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary);
        }

        /* NAV */
        nav {
            background: var(--card);
            box-shadow: 0 0 4px var(--shadow);
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        .nav-logo-img { height: auto; width: 80px; display: block; }
        .nav-links-right { display: flex; gap: 12px; }
        .nav-pill {
            font-size: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            border: 1.5px solid var(--primary);
            padding: 5px 14px;
            border-radius: 999px;
            transition: all 0.25s ease;
        }
        .nav-pill:hover { background: var(--primary); color: #fff; }
        .nav-pill.danger { border-color: #c0392b; color: #c0392b; }
        .nav-pill.danger:hover { background: #c0392b; color: #fff; }

        /* CARD */
        .feedback-container {
            max-width: 550px;
            margin: 60px auto;
            padding: 35px 30px;
            background-color: var(--card);
            border: 4px solid var(--primary);
            border-radius: 5px;
            box-shadow: rgba(0,0,0,0.25) 0px 54px 55px,
                        rgba(0,0,0,0.12) 0px -12px 30px,
                        rgba(0,0,0,0.12) 0px 4px 6px,
                        rgba(0,0,0,0.17) 0px 12px 13px,
                        rgba(0,0,0,0.09) 0px -3px 5px;
        }

        .feedback-container h2 {
            margin: 0 0 6px 0;
            font-size: 1.3rem;
            text-align: center;
        }
        .feedback-container .subtitle {
            text-align: center;
            font-size: 0.82rem;
            color: #815280;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
        }
        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 9px 10px;
            background-color: var(--bg);
            border: 1px solid var(--primary);
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary);
            font-size: 0.9rem;
            transition: border 0.2s, background 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border: 1.5px solid var(--primary);
            background-color: #e8d5f0;
        }
        textarea {
            resize: vertical;
            min-height: 110px;
        }

        /* STAR RATING */
        .star-group {
            margin-bottom: 16px;
        }
        .star-group label {
            margin-bottom: 8px;
        }
        .stars {
            display: flex;
            gap: 6px;
        }
        .stars span {
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--bg);
            -webkit-text-stroke: 1.5px var(--primary);
            transition: color 0.15s;
            user-select: none;
        }
        .stars span.active {
            color: var(--primary);
            -webkit-text-stroke: 1.5px var(--primary);
        }

        /* SUBMIT BUTTON */
        button[type="submit"] {
            width: 100%;
            padding: 10px 20px;
            margin-top: 8px;
            display: block;
            background-color: var(--bg);
            color: var(--primary);
            border: 1.5px solid var(--primary);
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.25s ease, color 0.25s ease;
        }
        button[type="submit"]:hover { background-color: #815280; color: #fff; }

        /* SUCCESS MESSAGE */
        .success-msg {
            display: none;
            text-align: center;
            padding: 18px;
            background: #e8d5f0;
            border: 1.5px solid var(--primary);
            border-radius: 5px;
            margin-top: 16px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .feedback-container { margin: 30px 15px; padding: 25px 18px; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="main-nav">
            <a href="index.html" class="nav-logo">
                <img src="./assets/logo3.png" alt="News App Logo" class="nav-logo-img">
            </a>
        </div>
        <div class="nav-links-right">
            <a href="index.html" class="nav-pill">Home</a>
            <a href="account.html" class="nav-pill">Account</a>
            <a href="login.html" class="nav-pill danger" onclick="confirmLogout(event)">Log Out</a>
        </div>
    </nav>

    <!-- FEEDBACK CARD -->
    <div class="feedback-container">
        <h2>Share Your Feedback</h2>
        <p class="subtitle">We'd love to hear what you think!</p>

        <form id="feedback-form">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <select id="category">
                    <option value="">-- Select a category --</option>
                    <option>General</option>
                    <option>Bug Report</option>
                    <option>Feature Request</option>
                    <option>Content Feedback</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="star-group">
                <label>Rating</label>
                <div class="stars" id="stars">
                    <span data-val="1">★</span>
                    <span data-val="2">★</span>
                    <span data-val="3">★</span>
                    <span data-val="4">★</span>
                    <span data-val="5">★</span>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Tell us what's on your mind..." required></textarea>
            </div>

            <button type="submit">Submit Feedback →</button>
        </form>

        <div class="success-msg" id="success-msg">
            ✓ Thank you! Your feedback has been submitted.
        </div>
    </div>

    <script>
        // Pre-fill name and email if user is logged in
        window.addEventListener('DOMContentLoaded', function () {
            const user = JSON.parse(localStorage.getItem('loggedInUser'));
            if (user) {
                document.getElementById('name').value = (user.firstname || '') + ' ' + (user.lastname || '');
                document.getElementById('email').value = user.email || '';
            }
        });

        // Star rating
        let selectedRating = 0;
        const stars = document.querySelectorAll('.stars span');

        stars.forEach(star => {
            star.addEventListener('mouseover', function () {
                highlightStars(this.dataset.val);
            });
            star.addEventListener('mouseout', function () {
                highlightStars(selectedRating);
            });
            star.addEventListener('click', function () {
                selectedRating = this.dataset.val;
                highlightStars(selectedRating);
            });
        });

        function highlightStars(val) {
            stars.forEach(s => {
                s.classList.toggle('active', s.dataset.val <= val);
            });
        }

        // Form submit
        document.getElementById('feedback-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const name     = document.getElementById('name').value.trim();
            const email    = document.getElementById('email').value.trim();
            const category = document.getElementById('category').value;
            const message  = document.getElementById('message').value.trim();

            if (!category) {
                alert('Please select a category.');
                return;
            }
            if (!selectedRating) {
                alert('Please select a rating.');
                return;
            }

            // Save feedback to localStorage
            const feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
            feedbacks.push({ name, email, category, rating: selectedRating, message, date: new Date().toLocaleDateString() });
            localStorage.setItem('feedbacks', JSON.stringify(feedbacks));

            // Show success
            document.getElementById('feedback-form').style.display = 'none';
            const msg = document.getElementById('success-msg');
            msg.style.display = 'block';
        });

        // Logout
        function confirmLogout(event) {
            event.preventDefault();
            if (confirm('Are you sure you want to log out?')) {
                localStorage.removeItem('loggedInUser');
                window.location.href = 'login.html';
            }
        }
    </script>

</body>
</html>
