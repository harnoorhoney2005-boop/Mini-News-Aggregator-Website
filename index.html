<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="main-nav container flex">
        <div class="left-section">
            <div class="menu-container">
                <button id="menu-button" class="menu-button">🟰</button>
                <div id="dropdown" class="dropdown-menu">
                    <a href="account.html">MY ACCOUNT</a>
                    <a href="login.html">LOGIN</a>
                    <a href="signup.html">SIGN UP</a>
                    <a href="feedback.html">FEEDBACK</a>
                </div>
            </div>
    <a href="#" onclick="event.preventDefault(); reload()" class="logo-link">
                <img src="./logo3.png" alt="company logo" class="logo">
    </a>
            </div>
            <div class="nav-links">
                <a href="#" class="navitem" id="Home" onclick="onNavItemClick('Home')">Home</a>
                <a href="#" class="navitem" id="World" onclick="onNavItemClick('World')">World</a>
                <a href="#" class="navitem" id="Politics" onclick="onNavItemClick('Politics')">Politics</a>
                <a href="#" class="navitem" id="Business" onclick="onNavItemClick('Business')">Business</a>
                <a href="#" class="navitem" id="Technology" onclick="onNavItemClick('Technology')">Technology</a>
                <a href="#" class="navitem" id="Science" onclick="onNavItemClick('Science')">Science</a>
                <a href="#" class="navitem" id="Health" onclick="onNavItemClick('Health')">Health</a>
                <a href="#" class="navitem" id="Sports" onclick="onNavItemClick('Sports')">Sports</a>
                <a href="#" class="navitem" id="Entertainment" onclick="onNavItemClick('Entertainment')">Entertainment</a>
            </div>
            <div class="search-bar flex">
                <input type="text" id="search-input" class="news-input" placeholder="Search news...">
                <button id="search-button" class="search-button">Search</button>
            </div>
        </div>
    </nav>
    <main>
        <div class="card-container container flex" id="cards-container"></div>
    </main>

    <template id="news-template">
        <div class="card">
            <div class="card-header">
                <img id="news-image" src="" alt="news image">
            </div>
            <div class="card-content">
                <h3 id="news-title"></h3>
                <h6 id="news-src" class="news-src"></h6>
                <p class="news-desc" id="news-desc"></p>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
